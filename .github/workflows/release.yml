name: Release

# Tag-driven publish. MinVer derives the version from the pushed tag (e.g. v1.2.3),
# so a release is "cut a tag" — nothing else. The `release` environment is a
# manual-approval gate that also holds the NUGET_API_KEY secret, so a tag never
# reaches NuGet without a human clicking approve.

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: pack · publish (NuGet)
    runs-on: ubuntu-latest
    environment: release # manual-approval gate; holds NUGET_API_KEY
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # MinVer needs full history + tags

      - name: Setup .NET (8 + 10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/Caliber.Webhooks/Caliber.Webhooks.csproj --configuration Release --no-build --output artifacts

      - name: Push to NuGet (pushes the .snupkg alongside)
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-nupkg
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error
