name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build · test · pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # MinVer needs full history + tags for versioning

      - name: Setup .NET (8 + 10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (Release, warnings-as-errors)
        run: dotnet build --configuration Release --no-restore

      - name: Test (net8.0 + net10.0, with coverage)
        run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Pack
        run: dotnet pack src/Caliber.Webhooks/Caliber.Webhooks.csproj --configuration Release --no-build --output artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error
