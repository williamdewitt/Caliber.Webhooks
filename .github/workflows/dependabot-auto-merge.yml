name: Dependabot auto-merge

# First dogfood of the classify → CI-green → auto-merge path, before the agent is
# ever pointed at it. A Dependabot *patch* bump is risk:trivial, so it earns
# native auto-merge: GitHub merges it once required checks are green, with no
# human. Minor/major bumps fall through to normal review.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Label by update type
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ "${{ steps.meta.outputs.update-type }}" = "version-update:semver-patch" ]; then
            gh pr edit "$PR_URL" --add-label "risk:trivial"
          fi

      - name: Enable auto-merge for patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
