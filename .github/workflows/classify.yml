name: Classify & auto-merge

# The deterministic spine. Every PR is classified into exactly one risk:* band by
# its changed paths (no model, free, reliable). That single label is the source of
# truth the merge gate reads. Native auto-merge is enabled so the PR merges itself
# once CI is green when the band is trivial, OR when it is low and confined entirely
# to samples/** (the deliberate downward relaxation, #52, that lets the WebhookSink
# slices build unattended).
#
# Precedence (highest blast radius wins): critical > core > low > trivial.
#   critical = public API surface, EF migrations, or security-sensitive source
#              (SSRF / signing / secret-at-rest)
#   core     = any source project under src/ (the core lib AND sibling provider
#              projects), the root build infra (Directory.*.props — repo-wide deps /
#              analyzers), OR any .github/workflows/** change (CI privilege / secret
#              surface — human-gated, never auto-merged)
#   low      = tests / samples / benchmarks only
#   trivial  = docs / markdown / .github *config* (issue templates, dependabot,
#              release-drafter) / editor & repo config — but NOT .github/workflows/**
#
# Uses pull_request_target (so it can label PRs from Dependabot and forks) but
# never checks out PR head code — it only reads the file list and writes labels.

on:
  pull_request_target:
    types: [ opened, synchronize, reopened, ready_for_review ]

permissions:
  contents: write # needed to enable native auto-merge on trivial PRs
  pull-requests: write

concurrency:
  group: classify-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const paths = files.map(f => f.filename);

            const isCritical = paths.some(p =>
              /(^|\/)PublicAPI\.(Shipped|Unshipped)\.txt$/.test(p) ||
              /(^|\/)Migrations\//.test(p) ||
              /(Ssrf|Signing|Signer|Secret)/i.test(p)
            );
            // Any source project — not just the core lib. Provider packages such as
            // Caliber.Webhooks.EntityFrameworkCore live in sibling src/ folders, so match
            // the whole src/ tree. Plus the root build infra (Directory.*.props) that sets
            // dependency versions and analyzers repo-wide — a high-blast-radius surface.
            const isCore = paths.some(p =>
              p.startsWith('src/') ||
              p === 'Directory.Build.props' ||
              p === 'Directory.Packages.props' ||
              p === 'Directory.Build.targets'
            );
            // A workflow definition controls CI privileges and secret access — high
            // blast radius. It is NOT trivial even though it lives under .github/ and
            // ends in .yml; treat it as core so it never auto-merges and a human must
            // merge it (CODEOWNERS also requires the owner's review). Dependabot patch
            // bumps to workflows still auto-merge via dependabot-auto-merge.yml, which
            // is actor-gated (trusted bot, patch only), not path-gated.
            const isWorkflow = paths.some(p => p.startsWith('.github/workflows/'));
            const isLow = paths.some(p => p.startsWith('tests/') || p.startsWith('samples/') || p.startsWith('benchmarks/'));
            // Fail-closed gate for the samples-only auto-merge relaxation (#52): true only when EVERY
            // changed path is under samples/**. Any src/**, workflow, migration, PublicAPI, or even docs/**
            // path makes this false (and usually bumps the band above 'low'), so a mixed PR never auto-merges.
            const allSamples = paths.length > 0 && paths.every(p => p.startsWith('samples/'));
            const allTrivial = paths.length > 0 && paths.every(p =>
              p.startsWith('docs/') ||
              (p.startsWith('.github/') && !p.startsWith('.github/workflows/')) ||
              p.endsWith('.md') ||
              p === 'llms.txt' ||
              /(^|\/)(\.editorconfig|\.gitignore|global\.json)$/.test(p) ||
              /\.(yml|yaml)$/.test(p)
            );

            let band;
            if (isCritical) band = 'critical';
            else if (isCore || isWorkflow) band = 'core';
            else if (allTrivial) band = 'trivial';
            else if (isLow) band = 'low';
            else band = 'low'; // unknown mix → conservative default

            const want = `risk:${band}`;
            const existing = (pr.labels || []).map(l => l.name).filter(n => n.startsWith('risk:'));
            for (const name of existing) {
              if (name !== want) {
                await github.rest.issues.removeLabel({
                  ...context.repo, issue_number: pr.number, name,
                }).catch(() => {});
              }
            }
            await github.rest.issues.addLabels({
              ...context.repo, issue_number: pr.number, labels: [want],
            });

            await core.summary
              .addHeading(`Risk band: ${band}`, 3)
              .addRaw(`Classified PR #${pr.number} from ${paths.length} changed path(s).`)
              .write();

            // Native auto-merge (merge on green, no human) is earned by:
            //   * any 'trivial' PR (docs / config), OR
            //   * a 'low' PR confined entirely to samples/** — the deliberate downward
            //     autonomy relaxation (#52) that lets the WebhookSink slices build unattended.
            // tests/** and benchmarks/** 'low' PRs stay human-gated; src/**, workflows, and all
            // protected paths are 'core'/'critical' and never reach this branch.
            const autoMerge = !pr.draft && (band === 'trivial' || (band === 'low' && allSamples));
            if (autoMerge) {
              try {
                await github.graphql(
                  `mutation($id: ID!) {
                     enablePullRequestAutoMerge(input: { pullRequestId: $id, mergeMethod: SQUASH }) {
                       clientMutationId
                     }
                   }`,
                  { id: pr.node_id },
                );
                const why = band === 'trivial' ? 'trivial' : 'samples-only low';
                core.notice(`Auto-merge enabled for ${why} PR #${pr.number}.`);
              } catch (e) {
                // Expected until branch protection requires checks (e.g. while the
                // repo is private on a plan without rulesets). Harmless.
                core.warning(`Could not enable auto-merge: ${e.message}`);
              }
            }
