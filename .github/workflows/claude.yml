name: Claude (agent-in-the-loop)

# Layer 4 / step 5 of the self-building loop: the agent itself.
#
# A trusted human mentions @claude on an issue or PR; the agent picks the work
# up, implements it, and opens (or pushes to) a PR. From there the rest of the
# loop takes over unchanged — classify.yml stamps the PR's risk:* band, the main
# ruleset + CODEOWNERS decide the merge gate, and trivial PRs self-merge on green.
# The agent only *produces* the change; it never decides its own merge.
#
# The routing-table spine (docs/design/development-loop.md) is realised here as
# model selection: one classification (the issue/PR's risk:* label) chooses the
# cheapest model that can do the job well — Haiku for trivial, Sonnet for low,
# Opus for core/critical. Effort rides on each model's own default (Claude Code
# runs Opus at xhigh), so model tier *is* the effort dial.
#
# Auth is provision-either: wire both secrets and set whichever you have.
#   - CLAUDE_CODE_OAUTH_TOKEN  → draws from your Pro/Max subscription quota
#                                (generate locally with `claude setup-token`).
#   - ANTHROPIC_API_KEY        → metered pay-per-token API, billed separately.
# The action uses the OAuth token when present, else the API key. With neither
# set the job no-ops with an auth error — harmless until a secret is added.

on:
  issue_comment:
    types: [ created ]
  pull_request_review_comment:
    types: [ created ]
  pull_request_review:
    types: [ submitted ]
  issues:
    types: [ opened ]

# Least privilege for what the agent needs: read/write code, open PRs, comment on
# issues, and mint the OIDC token the action uses. No more.
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read # the action reads its own workflow run metadata

# One run per conversation; a newer mention supersedes an in-flight one.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    # Public-repo guard: only act on an explicit @claude from a trusted actor
    # (owner / org member / repo collaborator). This keeps arbitrary external
    # users from triggering privileged, billable runs. The bot's own comments are
    # excluded so the agent can't trigger itself into a loop.
    if: |
      github.actor != 'github-actions[bot]' &&
      (
        (github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, '@claude') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review_comment' &&
          contains(github.event.comment.body, '@claude') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'issues' &&
          contains(github.event.issue.body, '@claude') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)) ||
        (github.event_name == 'pull_request_review' &&
          contains(github.event.review.body, '@claude') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association))
      )
    runs-on: ubuntu-latest
    steps:
      # The agent creates a branch and pushes a PR, so it needs the repo on disk.
      # Without a checkout the working tree is empty and branch setup fails
      # (`git fetch origin main`, exit 128).
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      # Map the work's risk:* band → model (the routing-table spine). Highest
      # blast radius wins; unlabelled work (e.g. a brand-new issue) defaults to
      # the balanced model.
      - name: Route risk band → model
        id: route
        uses: actions/github-script@v9
        with:
          script: |
            const ev = context.payload;
            const raw = ev.issue?.labels || ev.pull_request?.labels || [];
            const labels = raw.map(l => (typeof l === 'string' ? l : l.name));

            let model = 'claude-sonnet-4-6'; // balanced default (risk:low and unlabelled)
            if (labels.includes('risk:core') || labels.includes('risk:critical')) {
              model = 'claude-opus-4-8';     // highest capability for the library + critical surface
            } else if (labels.includes('risk:trivial')) {
              model = 'claude-haiku-4-5';    // cheapest for docs / config / markdown
            }

            core.setOutput('model', model);
            core.notice(`Routing to ${model} (labels: ${labels.join(', ') || 'none'}).`);

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          # Provision-either auth (see header). The action prefers the OAuth token.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Give the CI agent the dotnet-claude-kit. The in-CI agent does NOT inherit
          # the repo's committed .claude/settings.json (verified — issue #29); the
          # action installs ONLY the plugins named here. These two inputs bring the
          # kit's agents, commands, and skills — plain markdown, so it's just a cheap
          # marketplace clone + install with no indexing on every run. They do NOT
          # light up the Roslyn MCP server (cwm-roslyn-navigator): that needs a .NET
          # runtime + the tool on PATH and pays a whole-solution index cold-start per
          # run, so it stays deferred and — when added — label-gated to risk:core /
          # critical work. See docs/design/dotnet-claude-kit-adoption.md (issue #29).
          plugin_marketplaces: |
            https://github.com/codewithmukesh/dotnet-claude-kit.git
          plugins: |
            dotnet-claude-kit@dotnet-claude-kit
          # Risk-routed model + a turn cap. 50 gives a well-sized slice (one project /
          # one concern — see CLAUDE.md) headroom while still stopping a runaway task.
          # A run that hits error_max_turns means the slice was too big: split the issue,
          # don't just raise this — small slices are the design. The step below surfaces
          # such a failure so it is not silent.
          claude_args: |
            --model ${{ steps.route.outputs.model }}
            --max-turns 50

      # Make the loop hands-off. In tag mode the action pushes a branch but does
      # not open the PR (it leaves a "Create PR" link), so we open it. Crucially we
      # open it with a PAT (secrets.AGENT_PAT), NOT the default GITHUB_TOKEN: GitHub
      # suppresses all workflow runs triggered by GITHUB_TOKEN, so a GITHUB_TOKEN PR
      # would run neither ci.yml nor classify.yml and could never gate or auto-merge.
      # A PAT identity triggers both, so the agent's PR flows through the exact same
      # classify → ruleset/CODEOWNERS → auto-merge path as a human's. No PAT set →
      # this step no-ops and the human uses the agent's "Create PR" link instead.
      - name: Open the agent's PR (hands-off)
        if: >-
          success() &&
          (github.event_name == 'issues' ||
           (github.event_name == 'issue_comment' && !github.event.issue.pull_request))
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "No AGENT_PAT secret set — skipping auto-PR; use the agent's Create PR link."
            exit 0
          fi
          branch=$(gh api "repos/$REPO/branches" --paginate --jq '.[].name' \
            | grep "^claude/issue-${ISSUE}-" | sort | tail -1 || true)
          if [ -z "$branch" ]; then
            echo "No claude/issue-${ISSUE}-* branch — the agent made no changes."
            exit 0
          fi
          if [ "$(gh pr list --repo "$REPO" --head "$branch" --state open --json number --jq 'length')" != "0" ]; then
            echo "A PR is already open for $branch."
            exit 0
          fi
          title=$(gh issue view "$ISSUE" --repo "$REPO" --json title --jq .title)
          gh pr create --repo "$REPO" --base main --head "$branch" \
            --title "$title" \
            --body "Automated by the agent-in-the-loop for #${ISSUE}. Closes #${ISSUE}."
          echo "Opened PR for $branch."

      # Robustness: surface a failed run instead of failing silently. In the hands-off
      # model nobody is watching the Actions tab, so on failure we comment the run link
      # on the issue and flag it needs-triage. Posted with the default GITHUB_TOKEN — a
      # notification, never a re-trigger: github-actions[bot] is excluded by the guard
      # above and GITHUB_TOKEN-triggered runs are suppressed, so this cannot re-invoke
      # the agent. error_max_turns here usually means the slice was too big (see CLAUDE.md).
      - name: Surface a failed run
        if: >-
          failure() &&
          (github.event_name == 'issues' ||
           (github.event_name == 'issue_comment' && !github.event.issue.pull_request))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE" --repo "$REPO" --body "⚠️ The agent run for this issue failed — log: $RUN_URL — if it was a max-turns failure, the slice is likely too big for one run; split it into smaller sequential issues (see CLAUDE.md, 'Sizing work for the agent loop')." || true
          gh issue edit "$ISSUE" --repo "$REPO" --add-label needs-triage || true
